name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: parser/pyproject.toml

      - name: Install and test parser
        working-directory: parser
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
          ruff check src tests
          mypy src
          pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      - name: Install and test viewer
        working-directory: viewer
        run: |
          npm ci
          npm test

  build:
    name: Build static site
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: parser/pyproject.toml

      - name: Parse ETM PDFs
        working-directory: parser
        run: |
          python -m pip install -U pip
          pip install -e .
          bmw-parse parse-dir ../files -o ../viewer/public/data

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      - name: Build Next.js static export
        working-directory: viewer
        env:
          BASE_PATH: /bmw-scheme
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: viewer/out

  deploy:
    name: Deploy GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
